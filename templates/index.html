<!DOCTYPE html>
<html>
<head>
    <title>File Chunk Search</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>File Chunk Search</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>

        <input
            type="text"
            name="query"
            placeholder="Ask a question..."
            required
        >

        <button type="submit">Search</button>
    </form>

    {% if result %}
        <div class="result">
            <h2>Query</h2>
            <p>{{ query }}</p>
            <h2>Best Matching Chunk</h2>
            <p>{{ result }}</p>
        </div>
    {% endif %}
</div>

</body>
</html>
